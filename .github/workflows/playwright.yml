name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
  - cron: '0 8 * * *'  # Daily at 00:00 Pacific Time

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Install Chromium for BVT runs
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: npx playwright install --with-deps chromium

      - name: Install full Playwright browser set
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: npx playwright install --with-deps

      - name: Start static server
        run: |
          npx http-server -p 3000 -c- . &
          echo $! > server.pid
      
      - name: Wait for server
        run: |
          npx --yes wait-on --timeout 60000 http://localhost:3000
          curl --fail --silent --show-error --retry 5 --retry-delay 1 --retry-connrefused --head http://localhost:3000
      
      - name: Run BVT suite for push and pull request events
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        env:
          PLAYWRIGHT_HTML_OPEN: never
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npm run test:ci:bvt
      
      - name: Run full Playwright suite for nightly and manual events
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          PLAYWRIGHT_HTML_OPEN: never
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npm run test:ci:full
      
      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then kill $(cat server.pid) || true; fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
