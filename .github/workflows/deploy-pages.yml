name: Deploy (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject YouTube API key (optional)
        env:
          BOE_YT_API_KEY: ${{ secrets.BOE_YT_API_KEY }}
        run: |
          mkdir -p assets/js/data
          if [ -n "$BOE_YT_API_KEY" ]; then
            cat > assets/js/data/youtube-api.private.js <<EOF
// Private (generated at deploy time): YouTube Data API key for runtime-dynamic playlist loading.
//
// This file is generated by GitHub Actions from the BOE_YT_API_KEY secret.
// Anyone can still view this key in the browser on the live site.
// Protect it by restricting HTTP referrers in Google Cloud Console.
window.BOE_YT_API_KEY = '${BOE_YT_API_KEY}';
EOF
          else
            # Ensure the file exists so the <script> tag doesn't 404.
            cat > assets/js/data/youtube-api.private.js <<'EOF'
// Private (generated at deploy time): no key configured.
window.BOE_YT_API_KEY = '';
EOF
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
