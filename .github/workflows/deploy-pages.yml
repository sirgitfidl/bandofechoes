name: Deploy (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject YouTube API key (optional)
        env:
          BOE_YT_API_KEY: ${{ secrets.BOE_YT_API_KEY }}
        run: |
          node -e "const fs=require('fs'); const key=(process.env.BOE_YT_API_KEY||'').trim(); fs.mkdirSync('assets/js/data',{recursive:true}); const lines=[
            '// Private (generated at deploy time): YouTube Data API key for runtime-dynamic playlist loading.',
            '//',
            '// This file is generated by GitHub Actions from the BOE_YT_API_KEY secret.',
            '// Anyone can still view this key in the browser on the live site.',
            '// Protect it by restricting HTTP referrers in Google Cloud Console.',
            'window.BOE_YT_API_KEY = '+JSON.stringify(key)+';'
          ]; fs.writeFileSync('assets/js/data/youtube-api.private.js', lines.join('\\n')+'\\n');"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Remove dev-only folders
        run: |
          rm -rf node_modules || true
          rm -rf test-results playwright-report blob-report .test-results || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
