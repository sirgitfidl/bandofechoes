name: Deploy (GitHub Pages)

on:
  workflow_run:
    workflows:
      - E2E (Playwright)
    types:
      - completed
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject YouTube API key (optional)
        env:
          BOE_YT_API_KEY: ${{ secrets.BOE_YT_API_KEY }}
        run: |
          node -e "const fs=require('fs'); const key=(process.env.BOE_YT_API_KEY||'').trim(); console.log('BOE_YT_API_KEY length:', key.length); if(!key) console.log('WARNING: BOE_YT_API_KEY secret is empty/missing; site will use snapshot data only.'); fs.mkdirSync('assets/js/data',{recursive:true}); const lines=[
            '// GENERATED FILE: written at deploy time by GitHub Actions.',
            '// Source: BOE_YT_API_KEY GitHub Secret.',
            '//',
            '// IMPORTANT: This key is visible to site visitors in the browser.',
            '// Protect it by restricting HTTP referrers in Google Cloud Console.',
            'window.YT_API_KEY = '+JSON.stringify(key)+';'
          ]; fs.writeFileSync('assets/js/data/youtube-api.private.js', lines.join('\\n')+'\\n');"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Remove dev-only folders
        run: |
          rm -rf node_modules || true
          rm -rf test-results playwright-report blob-report .test-results || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
