<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Drink Tasting Comment Cards</title>
		<style>
			:root {
				color-scheme: dark;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
				line-height: 1.35;
				background: #0f1115;
				color: #eef1f6;
			}

			main {
				max-width: 980px;
				margin: 0 auto;
				padding: 24px 16px 64px;
			}

			.page-header {
				display: flex;
				justify-content: center;
				margin: 6px 0 18px;
			}

			.page-header img {
				width: min(520px, 88vw);
				height: auto;
				display: block;
				filter: none;
				opacity: 1;
			}

			header {
				margin: 8px 0 20px;
			}

			h1 {
				font-size: 22px;
				margin: 0 0 6px;
				letter-spacing: 0.2px;
			}

			p {
				margin: 0;
				color: #c8cfda;
			}

			form {
				display: grid;
				gap: 16px;
			}

			.card {
				background: #151923;
				border: 1px solid #2a3040;
				border-radius: 12px;
				padding: 16px;
			}

			.drink-title {
				margin: 0 0 12px;
				font-size: 18px;
			}

			.field {
				display: grid;
				gap: 6px;
				margin: 12px 0;
			}

			label {
				font-weight: 600;
			}

			textarea,
			input[type="text"],
			input[type="number"],
			select {
				width: 100%;
				border: 1px solid #384055;
				border-radius: 10px;
				padding: 10px 12px;
				font: inherit;
				background: #0f1115;
				color: #eef1f6;
			}

			textarea::placeholder,
			input::placeholder {
				color: #9aa6b7;
			}

			textarea {
				resize: vertical;
				min-height: 84px;
			}

			.choice-row {
				display: grid;
				gap: 8px;
			}

			.choice {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 10px 12px;
				border: 1px solid #384055;
				border-radius: 10px;
				background: #0f1115;
			}

			.choice input {
				margin: 0;
			}

			.note {
				font-size: 13px;
				color: #c8cfda;
			}

			.actions {
				display: flex;
				flex-wrap: wrap;
				gap: 10px;
				align-items: center;
			}

			button {
				border: 1px solid #eef1f6;
				background: #eef1f6;
				color: #0f1115;
				padding: 10px 14px;
				border-radius: 10px;
				font: inherit;
				cursor: pointer;
			}

			button.secondary {
				background: transparent;
				color: #eef1f6;
			}

			button:disabled {
				opacity: 0.6;
				cursor: not-allowed;
			}

			.status {
				margin-left: 2px;
				font-size: 14px;
				color: #6ee7b7;
			}

			.status.error {
				color: #fb7185;
			}

			footer {
				margin-top: 16px;
				font-size: 13px;
				color: #c8cfda;
			}
		</style>
	</head>
	<body>
		<main>
			<header class="page-header">
				<img src="speakEasyOtter.png" alt="Speakeasy Otter" decoding="async" />
			</header>

			<form id="commentForm">
				<div id="drinkCards"></div>

				<section class="card">
					<div class="field">
						<label for="favoriteDrink">What is your favorite drink?</label>
						<select id="favoriteDrink" name="favoriteDrink">
							<option value="" selected>(select one)</option>
							<option value="Drink 1">Drink 1</option>
							<option value="Drink 2">Drink 2</option>
							<option value="Drink 3">Drink 3</option>
							<option value="Drink 4">Drink 4</option>
							<option value="Drink 5">Drink 5</option>
							<option value="Drink 6">Drink 6</option>
							<option value="Drink 7">Drink 7</option>
							<option value="Drink 8">Drink 8</option>
						</select>
					</div>
				</section>

				<section class="card">
					<div class="actions">
						<button id="downloadBtn" type="button" class="secondary">Download JSON</button>
						<span id="status" class="status" role="status" aria-live="polite"></span>
					</div>
				</section>
			</form>
		</main>

		<script>
			const DRINK_COUNT = 8;

			const drinkCardsEl = document.getElementById("drinkCards");
			const formEl = document.getElementById("commentForm");
			const statusEl = document.getElementById("status");
			const downloadBtn = document.getElementById("downloadBtn");

			function setStatus(message, type = "ok") {
				statusEl.textContent = message;
				statusEl.classList.toggle("error", type === "error");
				if (message) {
					window.setTimeout(() => {
						if (statusEl.textContent === message) statusEl.textContent = "";
					}, 4000);
				}
			}

			function buildDrinkCardHtml(index) {
				const drinkNumber = index + 1;
				const prefix = `drink${drinkNumber}`;
				const strengthName = `${prefix}_strength`;
				const priceName = `${prefix}_price`;

				return `
					<section class="card" aria-labelledby="${prefix}_title">
						<h2 class="drink-title" id="${prefix}_title">Drink ${drinkNumber}</h2>

						<div class="field">
							<label for="${prefix}_idea">If you have an idea of what this drink is, what is it?</label>
							<textarea id="${prefix}_idea" name="${prefix}_idea"></textarea>
						</div>

						<div class="field">
							<label for="${prefix}_flavors">What are the dominant flavors?</label>
							<textarea id="${prefix}_flavors" name="${prefix}_flavors"></textarea>
						</div>

						<div class="field">
							<label>Is it too strong, not strong enough, just right?</label>
							<div class="choice-row" role="radiogroup" aria-label="Strength">
								<label class="choice"><input type="radio" name="${strengthName}" value="Too strong" /> Too strong</label>
								<label class="choice"><input type="radio" name="${strengthName}" value="Not strong enough" /> Not strong enough</label>
								<label class="choice"><input type="radio" name="${strengthName}" value="Just right" /> Just right</label>
							</div>
						</div>

						<div class="field">
							<label>Would you pay $12-$16 for this at a restaurant?</label>
							<div class="choice-row" role="radiogroup" aria-label="Price">
								<label class="choice"><input type="radio" name="${priceName}" value="Yes" /> Yes</label>
								<label class="choice"><input type="radio" name="${priceName}" value="No" /> No</label>
								<label class="choice"><input type="radio" name="${priceName}" value="Maybe" /> Maybe</label>
							</div>
						</div>

						<div class="field">
							<label for="${prefix}_likeMost">What do you like most about this drink?</label>
							<textarea id="${prefix}_likeMost" name="${prefix}_likeMost"></textarea>
						</div>

						<div class="field">
							<label for="${prefix}_score">Give your score 1-10</label>
							<input id="${prefix}_score" name="${prefix}_score" type="number" min="1" max="10" step="1" inputmode="numeric" />
						</div>

						<div class="field">
							<label for="${prefix}_improve">If it's less than 10, what could be improved?</label>
							<textarea id="${prefix}_improve" name="${prefix}_improve"></textarea>
						</div>
					</section>
				`;
			}

			function renderDrinkCards() {
				let html = "";
				for (let i = 0; i < DRINK_COUNT; i++) html += buildDrinkCardHtml(i);
				drinkCardsEl.innerHTML = html;
			}

			function getRadioValue(formData, name) {
				const v = formData.get(name);
				return typeof v === "string" ? v : "";
			}

			function getTextValue(formData, name) {
				const v = formData.get(name);
				return typeof v === "string" ? v.trim() : "";
			}

			function getNumberValue(formData, name) {
				const v = getTextValue(formData, name);
				if (!v) return null;
				const n = Number(v);
				if (!Number.isFinite(n)) return null;
				return n;
			}

			function collectSubmission() {
				const formData = new FormData(formEl);
				const drinks = [];

				for (let i = 1; i <= DRINK_COUNT; i++) {
					const prefix = `drink${i}`;
					drinks.push({
						drink: `Drink ${i}`,
						idea: getTextValue(formData, `${prefix}_idea`),
						dominantFlavors: getTextValue(formData, `${prefix}_flavors`),
						strength: getRadioValue(formData, `${prefix}_strength`),
						wouldPay12to16: getRadioValue(formData, `${prefix}_price`),
						likeMost: getTextValue(formData, `${prefix}_likeMost`),
						score1to10: getNumberValue(formData, `${prefix}_score`),
						improvementIfLessThan10: getTextValue(formData, `${prefix}_improve`),
					});
				}

				const favoriteDrink = getTextValue(formData, "favoriteDrink");

				return {
					createdAt: new Date().toISOString(),
					drinks,
					favoriteDrink,
				};
			}

			function downloadJson(filename, data) {
				const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
				const url = URL.createObjectURL(blob);
				const a = document.createElement("a");
				a.href = url;
				a.download = filename;
				document.body.appendChild(a);
				a.click();
				a.remove();
				URL.revokeObjectURL(url);
			}

			renderDrinkCards();

			downloadBtn.addEventListener("click", () => {
				const submission = collectSubmission();

				// Minimal sanity check: if everything is blank, don’t download.
				const anyNonEmpty =
					submission.favoriteDrink ||
					submission.drinks.some((d) =>
						[
							d.idea,
							d.dominantFlavors,
							d.strength,
							d.wouldPay12to16,
							d.likeMost,
							d.improvementIfLessThan10,
						].some((x) => String(x || "").trim().length > 0) ||
						(typeof d.score1to10 === "number" && d.score1to10 >= 1)
					);

				if (!anyNonEmpty) {
					setStatus("Nothing to download yet.", "error");
					return;
				}

				const date = new Date();
				const yyyy = String(date.getFullYear());
				const mm = String(date.getMonth() + 1).padStart(2, "0");
				const dd = String(date.getDate()).padStart(2, "0");
				downloadJson(`drink-comment-card_${yyyy}-${mm}-${dd}.json`, submission);
				setStatus("Downloaded JSON.");
			});
		</script>
	</body>
</html>
